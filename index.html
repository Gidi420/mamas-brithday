<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Mama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush:      #f5c6c6;
      --blush-deep: #e8a0a0;
      --cream:      #fdf6ee;
      --cream-dark: #f5e8d8;
      --gold:       #c9a96e;
      --gold-light: #e8d5b0;
      --text:       #5a3e36;
      --text-light: #8c6458;
      --white:      #fffcf8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      overflow-x: hidden;
    }

    /* ─── Petal Canvas ─── */
    #petal-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Scroll Fade-in ─── */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── Hero ─── */
    #hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(
        160deg,
        #fff0f0 0%,
        #fde8d8 40%,
        #f9e4c8 70%,
        #fdf6ee 100%
      );
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(201,169,110,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-flourish {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--gold);
      letter-spacing: 0.2em;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.3s forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--text);
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.6s forwards;
    }

    .hero-title em {
      font-style: italic;
      color: var(--blush-deep);
    }

    .hero-sub {
      margin-top: 1.6rem;
      font-family: 'Lora', serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-style: italic;
      color: var(--text-light);
      opacity: 0;
      animation: fadeUp 1.2s ease 1s forwards;
    }

    .hero-divider {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 1.3s forwards;
    }

    .hero-divider span {
      display: block;
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .hero-divider svg {
      width: 24px; height: 24px;
      fill: var(--gold);
    }

    .scroll-cue {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 2s forwards;
    }

    .scroll-cue span {
      font-family: 'Dancing Script', cursive;
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .scroll-cue .arrow {
      width: 20px; height: 20px;
      border-right: 1.5px solid var(--gold);
      border-bottom: 1.5px solid var(--gold);
      transform: rotate(45deg);
      animation: bounce 2s infinite;
    }

    /* ─── Section Wrapper ─── */
    .section {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 6rem 2rem;
    }

    .section-label {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 0.6rem;
    }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 600;
      text-align: center;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 1.2rem auto 2.5rem;
    }

    .ornament-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    }

    .ornament svg {
      width: 18px; height: 18px;
      fill: var(--gold-light);
    }

    /* ─── Letter Section ─── */
    #letter {
      background: linear-gradient(180deg, var(--cream) 0%, var(--cream-dark) 100%);
    }

    .letter-card {
      background: var(--white);
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 3px;
      padding: clamp(2rem, 6vw, 4rem);
      box-shadow:
        0 2px 8px rgba(90,62,54,0.05),
        0 12px 40px rgba(90,62,54,0.06),
        inset 0 0 0 6px rgba(201,169,110,0.04);
      position: relative;
    }

    .letter-card::before {
      content: '\201C';
      position: absolute;
      top: 1.2rem;
      left: 1.8rem;
      font-family: 'Playfair Display', serif;
      font-size: 6rem;
      line-height: 1;
      color: var(--blush);
      opacity: 0.6;
    }

    .letter-body {
      font-family: 'Lora', serif;
      font-size: clamp(1rem, 2vw, 1.125rem);
      line-height: 1.9;
      color: var(--text);
      padding-top: 1.5rem;
      /* ── PLACEHOLDER TEXT — replace everything between the <p> tags ── */
    }

    .letter-body p {
      margin-bottom: 1.4em;
    }

    .letter-body p:last-child {
      margin-bottom: 0;
    }

    /* ─── Gallery Section ─── */
    #gallery {
      background: linear-gradient(180deg, var(--cream-dark) 0%, #f0e0d0 50%, var(--cream-dark) 100%);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    .gallery-item {
      position: relative;
      border-radius: 3px;
      overflow: hidden;
      aspect-ratio: 4/5;
      background: var(--blush);
      box-shadow: 0 4px 20px rgba(90,62,54,0.12);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .gallery-item:nth-child(2) { aspect-ratio: 3/4; }
    .gallery-item:nth-child(4) { aspect-ratio: 3/4; }
    .gallery-item:nth-child(6) { aspect-ratio: 4/5; }

    .gallery-item:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 12px 36px rgba(90,62,54,0.18);
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
    }

    .gallery-item .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(90,62,54,0.35) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .gallery-item:hover .photo-overlay { opacity: 1; }

    /* placeholder card shown when no real image */
    .gallery-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--blush) 0%, var(--cream-dark) 100%);
      color: var(--text-light);
      gap: 0.6rem;
      font-family: 'Dancing Script', cursive;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    .gallery-placeholder svg {
      width: 36px; height: 36px;
      stroke: var(--blush-deep);
      fill: none;
      stroke-width: 1.2;
      opacity: 0.6;
    }

    /* ─── Closing Section ─── */
    #closing {
      background: linear-gradient(180deg, var(--cream-dark) 0%, var(--cream) 100%);
      text-align: center;
    }

    .closing-card {
      background: var(--white);
      border: 1px solid rgba(201,169,110,0.2);
      border-radius: 3px;
      padding: clamp(2.5rem, 7vw, 5rem) clamp(2rem, 6vw, 4rem);
      box-shadow: 0 2px 8px rgba(90,62,54,0.05), 0 12px 40px rgba(90,62,54,0.06);
      max-width: 600px;
      margin: 0 auto;
    }

    .closing-quote {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-style: italic;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .closing-signoff {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--blush-deep);
      line-height: 1.5;
    }

    .closing-heart {
      margin-top: 1.5rem;
      font-size: 2rem;
      color: var(--blush-deep);
      animation: heartbeat 2.2s ease infinite;
      display: block;
    }

    /* ─── Footer ─── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      font-family: 'Dancing Script', cursive;
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      background: var(--cream);
      border-top: 1px solid rgba(201,169,110,0.15);
    }

    /* ─── Keyframes ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50%       { transform: rotate(45deg) translateY(6px); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%      { transform: scale(1.2); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.15); }
      56%      { transform: scale(1); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .gallery-item { aspect-ratio: 4/5 !important; }
    }

    @media (max-width: 400px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       JAVASCRIPT — Petals + Scroll Reveal
  ═══════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    /* ── Falling Petal Animation ── */
    const canvas = document.getElementById('petal-canvas');
    const ctx    = canvas.getContext('2d');

    let W = 0, H = 0;
    const petals = [];

    const PETAL_COLORS = [
      'rgba(245,198,198,',   // blush
      'rgba(232,160,160,',   // blush-deep
      'rgba(248,220,200,',   // peach-cream
      'rgba(255,210,210,',   // light rose
      'rgba(201,169,110,',   // gold
    ];

    function resize () {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function createPetal () {
      const colorBase = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
      return {
        x:         randomBetween(0, W),
        y:         randomBetween(-200, -10),
        size:      randomBetween(6, 18),
        speedY:    randomBetween(0.6, 1.8),
        speedX:    randomBetween(-0.8, 0.8),
        rotation:  randomBetween(0, Math.PI * 2),
        rotSpeed:  randomBetween(-0.015, 0.015),
        wobble:    randomBetween(0, Math.PI * 2),
        wobbleSpd: randomBetween(0.01, 0.03),
        wobbleAmp: randomBetween(0.4, 1.2),
        alpha:     randomBetween(0.3, 0.75),
        color:     colorBase,
      };
    }

    /* Initialise with some petals already on screen */
    for (let i = 0; i < 45; i++) {
      const p = createPetal();
      p.y = randomBetween(0, H);
      petals.push(p);
    }

    function drawPetal (p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);

      /* simple oval petal shape */
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.5, p.size, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ')';
      ctx.fill();

      /* subtle inner highlight */
      ctx.beginPath();
      ctx.ellipse(p.size * 0.05, -p.size * 0.15, p.size * 0.18, p.size * 0.45, -0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (p.alpha * 0.35) + ')';
      ctx.fill();

      ctx.restore();
    }

    function tick () {
      ctx.clearRect(0, 0, W, H);

      for (let i = petals.length - 1; i >= 0; i--) {
        const p = petals[i];

        p.wobble    += p.wobbleSpd;
        p.x         += p.speedX + Math.sin(p.wobble) * p.wobbleAmp;
        p.y         += p.speedY;
        p.rotation  += p.rotSpeed;

        drawPetal(p);

        if (p.y > H + 30) {
          petals.splice(i, 1);
          petals.push(createPetal());
        }
      }

      /* keep total count around 45 */
      while (petals.length < 45) petals.push(createPetal());

      requestAnimationFrame(tick);
    }

    tick();

    /* ── Scroll Reveal ── */
    const reveals = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.12, rootMargin: '0px 0px -60px 0px' }
    );

    reveals.forEach(function (el) { observer.observe(el); });

  })();
  </script>
